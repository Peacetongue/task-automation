name: task-automation

networks:
  tasknet:
    driver: bridge
  # Корп. мониторинг сканирует контейнеры в этой сети через Docker SD.
  # На prod эта сеть создаётся devops'ом (external: true).
  # Локально создать один раз: `docker network create monitoring`
  # (smoke_test / README напоминают).
  monitoring:
    external: true

volumes:
  hermes_state:
  corp_tokens:        # /opt/data/user_tokens/<telegram_id>.json

services:
  whisper-shim:
    # COMPANY Transcribe уже предоставляет /api/v1/audio/transcriptions, но
    # по умолчанию отвечает SSE-стримом (`stream=true` — OpenAI-клиент
    # Hermes такой формат не понимает). Shim форвардит запрос и дополняет
    # его `stream=false`, после чего возвращает {"text": "..."} в OpenAI-
    # совместимом виде. Подробности — whisper_shim/app.py.
    build:
      context: ./whisper_shim
    restart: unless-stopped
    networks: [tasknet, monitoring]
    ports:
      - "9000:9000"
    environment:
      # TA_-префикс в .env чтобы shell env случайно не перебивал
      # (export TRANSCRIBE_SERVICE_URL где-нибудь в .bashrc ломал бы сборку).
      # Внутрь контейнера приходит обычное имя — whisper_shim/app.py
      # читает TRANSCRIBE_SERVICE_URL без префикса.
      TRANSCRIBE_SERVICE_URL: ${TA_TRANSCRIBE_SERVICE_URL:-http://ml-platform-big.company.loc:9204}
      TRANSCRIBE_POLL_TIMEOUT: ${TA_TRANSCRIBE_POLL_TIMEOUT:-120}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:9000/healthz',timeout=3).status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "prometheus_scrape=false"
      - "app_name=whisper-shim"
      - "app_type=backend"
      - "version=0.3.0"

  metrics-sidecar:
    build:
      context: ./metrics_sidecar
    restart: unless-stopped
    networks: [tasknet, monitoring]
    ports:
      - "8000:8000"
    environment:
      HERMES_LOG_PATH: /hermes_data/logs/agent.log
      HERMES_STATE_DB: /hermes_data/state.db
    volumes:
      # Read-only mount of hermes' /opt/data so we can tail logs + query state.db.
      - ./hermes:/hermes_data:ro
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz',timeout=3).status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "prometheus_scrape=true"
      - "prometheus_port=8000"
      - "prometheus_path=/metrics"
      - "app_name=hermes-metrics"
      - "app_type=backend"
      - "version=0.2.0"

  hermes:
    image: nousresearch/hermes-agent
    restart: unless-stopped
    networks: [tasknet, monitoring]
    depends_on:
      whisper-shim:
        condition: service_started
    command: ["gateway", "run"]
    ports:
      - "8642:8642"
    environment:
      HERMES_UID: "10000"
      # Все чувствительные секреты приходят через TA_*-ключи в .env,
      # чтобы shell не мог их случайно перебить (на dev мы на эту
      # грабилью неоднократно наступали — см. коммит-историю про
      # "stale token override"). Внутри контейнера имена остаются
      # нативными — Hermes читает TELEGRAM_BOT_TOKEN, OPENAI_API_KEY
      # и т.п. без префикса.
      TELEGRAM_BOT_TOKEN: ${TA_TELEGRAM_BOT_TOKEN:?TA_TELEGRAM_BOT_TOKEN must be set in .env}
      TELEGRAM_ALLOWED_USERS: ${TA_TELEGRAM_ALLOWED_USERS:?TA_TELEGRAM_ALLOWED_USERS must be set in .env}
      OPENAI_BASE_URL: ${TA_OPENAI_BASE_URL:?TA_OPENAI_BASE_URL must be set in .env}
      OPENAI_API_KEY: ${TA_OPENAI_API_KEY:?TA_OPENAI_API_KEY must be set in .env}
    volumes:
      - ./hermes:/opt/data
      # team.yaml монтируется rw: скилл `team_admin` добавляет новых
      # членов прямо из чата (только teamlead может). Защита — в SOUL.md
      # + в самом скилле (проверка роли + валидация через Jira/GitLab
      # REST-лукап, чтобы не добавить фейк).
      - ./config:/opt/data/config
      - hermes_state:/opt/data/sessions
      - corp_tokens:/opt/data/user_tokens    # PAT-ы пользователей per-user
    labels:
      # Сам Hermes метрик не отдаёт — метрики про него экспортирует
      # metrics-sidecar. Но метим контейнер общими info-метками.
      - "prometheus_scrape=false"
      - "app_name=hermes-gateway"
      - "app_type=backend"
      - "version=0.2.0"
