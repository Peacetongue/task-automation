# Hermes config for corporate team assistant.
#
# Остальное, что не задано здесь, наследуется из дефолтного
# cli-config.yaml.example внутри образа. Мы намеренно НЕ переопределяем
# секции skills/memory/cron/browser/... — базовый Hermes со всеми
# встроенными возможностями остаётся доступен.

model:
  # Формат обязательно "Provider/Name". env-substitution в Hermes ломается
  # на auxiliary-пути — зашиваем литералом.
  default: "InHouse/Qwen3.5-122B"
  provider: "custom"
  base_url: "${OPENAI_BASE_URL}"           # подставится из env на старте
  # api_key подхватится автоматически из env OPENAI_API_KEY

stt:
  enabled: true
  provider: "openai"
  openai:
    # whisper-shim форвардит POST /v1/audio/transcriptions в биокадовский
    # сервис, но с принудительным `stream=false` — иначе тот отдаёт SSE,
    # который OpenAI-клиент Hermes не понимает.
    base_url: "http://whisper-shim:9000/v1"
    api_key: "dummy-ignored"
    model: "whisper-1"

platforms:
  telegram:
    enabled: true
    reply_to_mode: "first"

# Кастомный набор = hermes-telegram минус `tts`. TTS триггерит эвристику
# "voice in → voice out", которая пытается отправить голосовой ответ;
# если у пользователя в Telegram Privacy → Voice Messages стоит "Nobody",
# Telegram отбивает с `Voice_messages_forbidden` и засоряет логи. Входящие
# голосовые всё равно обрабатываются (STT не зависит от этого toolset'а).
platform_toolsets:
  telegram:
    - terminal       # REST-вызовы из jira/confluence/gitlab/setup skills
    - file
    - web
    - vision
    - image_gen
    - browser
    - skills
    - todo
    - cronjob
    - send_message   # для team_message (cross-user DM + broadcast)

# MCP-серверы не используем для этого пилота. У on-prem Jira / Confluence /
# GitLab нет MCP из коробки, а Atlassian Cloud Remote MCP требует OAuth 2.1 —
# слишком жирно для pilot'а. Вместо MCP — обычные skills, вызывающие REST
# через terminal_tool + python3 + urllib.request, с per-user PAT из
# /opt/data/user_tokens/<telegram_id>.json (см. skill `setup`).
mcp_servers: {}
